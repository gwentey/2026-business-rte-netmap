# Multiple Message Signing Properties
## Enable/disable Default Message Signer component responsible for digital signing of the message
## and verification of message signature.
## Note that there can be zero (unsigned message) or more messages signer components involved at creation
## and verification of multiple message digital signatures.
## See also "ecp.security.messageSigner.special.enabled" configuration parameter
#ecp.security.messageSigner.default.enabled = 

## Enable/disable Special Message Signer component implementations
## which load private keys and certificates from java keystores at specific location
#ecp.security.messageSigner.special.enabled = 
## Special message signer keystore alias (e.g. ecp_module_sign)
#ecp.security.keyStore.keyAlias = 
## Special message signer keystore password
#ecp.security.keyStore.keyStorePass = 
## Special message signer keystores directory location.
## configured directory will be searched for keystore files with following name pattern:
## - SenderKeystore-<endpoint_code>.jks
## - ReceiverKeystore-<endpoint_code>.jks
#ecp.security.keyStore.keystorePath = 

