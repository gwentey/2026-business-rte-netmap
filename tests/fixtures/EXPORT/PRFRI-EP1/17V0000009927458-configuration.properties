## Information which priority has business type (multiple values separated by comma)
#ecp.endpoint.priorityConfiguration[0].messageType = 
## Message priority in range 0-9 inclusive is supported
#ecp.endpoint.priorityConfiguration[0].priority = 
## Information whether AMQP API is enabled
#ecp.endpoint.amqpApiEnabled = 
## AMQP API - Define list of incoming queue names for different message business types
## Note that default queue with name ecp.endpoint.inbox for business message type * is defined
#ecp.endpoint.routes.incomingQueue[0].incomingQueue = 
## Queue business type (multiple values separated by comma)
#ecp.endpoint.routes.incomingQueue[0].messageTypes = 
## Information whether direct messaging is enabled on endpoint. Default value is false
#ecp.endpoint.directMessagingEnabled = 
## Definition of endpoint url ( url of endpoint external broker must be set when direct messaging is enabled )
## Pattern of the url is <protocol>://<host>:<port>
#ecp.urls = 

## Enables Receive All button in Messages UC (should be for testing purposes only)
#ecp.messagebox.showReceiveAll = 
## Connectivity check attempt timeout interval at milliseconds. Default value is 2000ms
#ecp.endpoint.connectivityCheckAttemptTimeout = 
## Number of connectivity check attempts to receive tracing acknowledgements. Default value is 5.
#ecp.endpoint.connectivityCheckAttemptsCount = 
## Enables antivirus scan on received message's payload. Default value is false.
#ecp.endpoint.antivirus.antivirusEnabled = 
## Antivirus client used for scanning. Possible values: clamav, symantec
#ecp.endpoint.antivirus.antivirusClient = 
## IP address of antivirus server
#ecp.endpoint.antivirus.antivirusIp = 
## Network port of antivirus server. Default value is 3310 for ClamAV and 1344 for Symantec.
#ecp.endpoint.antivirus.antivirusPort = 
## Antivirus scan timeout in milliseconds. Default value is 10000.
#ecp.endpoint.antivirus.antivirusTimeout = 
## Text used to replace an infected payload.
## When text contains a character sequence %s, then this sequence will be replaced with the message ID.
## Otherwise the message ID is placed at the end of the text.
#ecp.endpoint.antivirus.antivirusReplaceText = 
## Path to quarantine folder
#ecp.endpoint.antivirus.quarantinePath = 

## JMS headers validation
#ecp.endpoint.jmsHeadersValidationEnabled = 
## Logs for messages will be written to one file per day (default value  is false - a log file per message will be created)
#ecp.endpoint.fssf.useSingleLogPerDay = 
## Default file extension which will be added to a filename when no extension is defined in a message and no extension is configured for a message type
#ecp.endpoint.fssf.defaultExtension = 

## MessageBox Settings
## Retention period of the message box [ms]. After this period archived messages will be deleted from message box
## Default value is 14 days
#ecp.messagebox.retentionPeriod = 
## Define period how often will be run the message deleting [ms]
## Default value is one hour
#ecp.messagebox.messageDeletingRunPeriod = 


## Message Compression Settings
## Information whether compression is enabled. Default value is true.
#ecp.endpoint.compressionEnabled = 
## Define which message types are marked to compress (multiple values separated by comma). Default value is *
#ecp.endpoint.messageTypesToCompress = 

