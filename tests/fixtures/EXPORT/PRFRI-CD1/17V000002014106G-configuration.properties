
## Component directory URL with pattern <protocol>://<host>:<port>
## Multiple values are separated by comma.
ecp.urls = https://185.30.132.171:8443/ECP_MODULE

## Definition of directory networks
ecp.networks = internet

## Information whether NAT is enabled. Default value is false.
#ecp.natEnabled = 
## List of NAT records
## Network code. If empty, default code is used.
#ecp.natTable[0].network = 
## Source IP for NAT
#ecp.natTable[0].sourceIp = 
## Translated IP for NAT
#ecp.natTable[0].destinationIp = 
## Source port for NAT. If empty, port is not translated.
#ecp.natTable[0].sourcePort = 
## Translated port for NAT
#ecp.natTable[0].destinationPort = 

## Time to live for all components of the home component directory
#ecp.directory.ttl = 

## Monitoring threshold for synchronization of components
#ecp.metricsSyncThreshold = 

# Application theme
## Allows to customize look and feel
ecp.appTheme = WHITE

# Project name
ecp.projectName = INTERNET-CD
# Environment name
ecp.envName = ACCEPTANCE
